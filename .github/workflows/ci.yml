name: CI

on:
  push:
    branches: [ main, confirm-ci ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Debug - Show environment info
      run: |
        echo "=== Node.js version ==="
        node --version
        echo "=== npm version ==="
        npm --version
        echo "=== Current directory ==="
        pwd
        echo "=== Directory structure ==="
        ls -la
        echo "=== Test directory structure ==="
        ls -la test/
        echo "=== Package.json scripts ==="
        cat package.json | grep -A 5 '"scripts"'

    - name: Debug - Test glob expansion
      run: |
        echo "=== Testing glob patterns ==="
        echo "test/*.test.js expands to:"
        ls test/*.test.js
        echo "test/**/*.test.js expands to:"
        ls test/**/*.test.js || echo "Failed to expand test/**/*.test.js"

    - name: Debug - Test Node.js version specific glob support
      run: |
        echo "=== Node.js version specific tests ==="
        echo "Node version: $(node --version)"
        echo "Testing ** pattern support:"
        node --test test/**/*.test.js && echo "** pattern works on $(node --version)" || echo "** pattern fails on $(node --version)"

    - name: Run tests
      run: |
        echo "=== Running npm test ==="
        npm test
        echo "=== Test exit code: $? ==="

    - name: Debug - Manual test execution
      run: |
        echo "=== Testing individual files manually ==="
        echo "Testing diffJsonValues.test.js:"
        node --test test/diffJsonValues.test.js || echo "Failed with exit code $?"
        echo "Testing diffJsonFiles.test.js:"
        node --test test/diffJsonFiles.test.js || echo "Failed with exit code $?"
        echo "Testing toPathJqQuery.test.js:"
        node --test test/toPathJqQuery.test.js || echo "Failed with exit code $?"

    - name: Test CLI functionality
      run: |
        # Create test files for CLI testing
        echo '{"name": "test", "value": 1}' > test-left.json
        echo '{"name": "test", "value": 2}' > test-right.json

        # Test the CLI
        node bin/json-diff test-left.json test-right.json

        # Clean up
        rm test-left.json test-right.json

